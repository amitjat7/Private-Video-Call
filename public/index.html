<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Video Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="notification-container"></div>

    <!-- ═══ SETUP PANEL ═══ -->
    <div id="setup-panel" class="page">
        <div class="setup-wrap">
            <div class="brand">
                <div class="brand-mark"><i class="fas fa-video"></i></div>
                <h1 class="brand-title">Private Video Call</h1>
                <p class="brand-sub">Private, peer-to-peer video sessions.<br>No accounts. No history. Just talk.</p>
            </div>

            <div class="card">
                <div class="tabs">
                    <button id="tab-create" class="tab active" onclick="if (!window.__cfRLUnblockHandlers) return false; switchTab('create')" data-cf-modified-8579f73239beee639ff052a0-="">Create Room</button>
                    <button id="tab-join" class="tab" onclick="if (!window.__cfRLUnblockHandlers) return false; switchTab('join')" data-cf-modified-8579f73239beee639ff052a0-="">Join Room</button>
                    <div class="tab-indicator"></div>
                </div>

                <!-- CREATE -->
                <div id="create-area" class="tab-content">
                    <label class="field-label">Your Name</label>
                    <input id="create-name" type="text" class="input" placeholder="e.g. Amit Choudhary" maxlength="15" autocomplete="off">

                    <label class="field-label">Room Code <span class="hint">8 digits</span></label>
                    <div class="code-row">
                        <input id="create-code" type="text" class="input" placeholder="00000000" maxlength="8" inputmode="numeric" autocomplete="off">
                        <button class="btn-ghost" onclick="if (!window.__cfRLUnblockHandlers) return false; generateCode()" title="Generate random code" data-cf-modified-8579f73239beee639ff052a0-=""><i class="fas fa-dice"></i></button>
                    </div>

                    <label class="field-label">Participants</label>
                    <select id="max-users" class="input select">
                        <option value="2">2 people</option>
                        <option value="3">3 people</option>
                        <option value="4">4 people</option>
                    </select>

                    <button id="btn-create" class="btn-primary" onclick="if (!window.__cfRLUnblockHandlers) return false; actionCreateRoom()" data-cf-modified-8579f73239beee639ff052a0-="">
                        <span class="spinner d-none"></span>
                        <span class="btn-text">Create &amp; Share Link</span>
                    </button>
                </div>

                <!-- JOIN -->
                <div id="join-area" class="tab-content d-none">
                    <label class="field-label">Your Name</label>
                    <input id="join-name" type="text" class="input" placeholder="e.g. Amit Choudhary" maxlength="15" autocomplete="off">

                    <label class="field-label">Room Code</label>
                    <input id="join-code" type="text" class="input" placeholder="00000000" maxlength="8" inputmode="numeric" autocomplete="off">

                    <button id="btn-join" class="btn-primary" onclick="if (!window.__cfRLUnblockHandlers) return false; actionJoinRoom()" data-cf-modified-8579f73239beee639ff052a0-="">
                        <span class="spinner d-none"></span>
                        <span class="btn-text">Join Session</span>
                    </button>
                </div>
            </div>

            <footer class="site-footer">
                <a id="github-link" href="#" target="_blank" rel="noopener noreferrer" class="gh-link">
                    <i class="fab fa-github"></i>
                    <span>Developed by <strong id="github-handle">—</strong></span>
                </a>
            </footer>
        </div>
    </div>

    <!-- ═══ CALL PANEL ═══ -->
    <div id="call-panel" class="page d-none">
        <div class="call-header">
            <div class="call-info">
                <span class="live-dot"></span>
                <span id="room-label">Session Active</span>
            </div>
            <button class="btn-ghost small" onclick="if (!window.__cfRLUnblockHandlers) return false; copyInvite()" data-cf-modified-8579f73239beee639ff052a0-=""><i class="fas fa-link"></i> Copy Invite</button>
        </div>

        <div id="video-grid">
            <div class="video-container" id="local-box">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="camera-off-overlay d-none" id="local-cam-overlay"><i class="fas fa-video-slash"></i></div>
                <div class="name-tag">
                    <span id="local-name-tag">You</span>
                    <i class="fas fa-microphone-slash mute-icon d-none" id="local-mute-icon"></i>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-mute" class="ctrl-btn" onclick="if (!window.__cfRLUnblockHandlers) return false; toggleMute()" data-cf-modified-8579f73239beee639ff052a0-="">Mute</button>
            <button id="btn-camera" class="ctrl-btn" onclick="if (!window.__cfRLUnblockHandlers) return false; toggleCamera()" data-cf-modified-8579f73239beee639ff052a0-="">Stop Video</button>
            <button class="ctrl-btn danger" onclick="if (!window.__cfRLUnblockHandlers) return false; confirmEndCall()" data-cf-modified-8579f73239beee639ff052a0-="">End Call</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js" type="8579f73239beee639ff052a0-text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js" type="8579f73239beee639ff052a0-text/javascript"></script>
    <script src="script.js" type="8579f73239beee639ff052a0-text/javascript"></script>

</html>
